# Optional TLS overlay — run with:
#   docker compose -f docker-compose.yml -f docker-compose.tls.yml up -d caddy
#
# Requires Smart VMS UI on host port 5173 (npm run dev or npm run preview).

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - '443:443'
      - '80:80'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
